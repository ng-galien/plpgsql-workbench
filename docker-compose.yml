# Dev DB — PostgreSQL 17 + plpgsql_check + pgtap (port 5433)
# Usage: docker compose up -d / docker compose down -v (wipe)
services:
  postgres:
    image: pg-workbench
    ports:
      - "5433:5432"
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./seed:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
