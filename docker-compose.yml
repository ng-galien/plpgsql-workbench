services:
  postgres:
    image: supabase/postgres:17.6.1.093
    ports:
      - "5433:5432"
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
      JWT_SECRET: super-secret-jwt-token-with-at-least-32-characters
      JWT_EXP: 3600
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./sql/seed/001_extensions.sql:/docker-entrypoint-initdb.d/init-scripts/90-extensions.sql:ro
      - ./sql/seed/002_roles.sql:/docker-entrypoint-initdb.d/init-scripts/91-roles.sql:ro
      - ./sql/seed/003_workbench.sql:/docker-entrypoint-initdb.d/init-scripts/92-workbench.sql:ro
      - ./sql/seed/004_pgv.sql:/docker-entrypoint-initdb.d/init-scripts/93-pgv.sql:ro
      - ./sql/seed/005_app.sql:/docker-entrypoint-initdb.d/init-scripts/94-app.sql:ro
      - ./sql/seed/006_uxlab.sql:/docker-entrypoint-initdb.d/init-scripts/95-uxlab.sql:ro
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10
    command:
      - postgres
      - -c
      - config_file=/etc/postgresql/postgresql.conf
      - -c
      - log_min_messages=fatal

  postgrest:
    image: postgrest/postgrest:v12.2.3
    ports:
      - "3000:3000"
    environment:
      PGRST_DB_URI: postgres://authenticator:authenticator@postgres:5432/postgres
      PGRST_DB_SCHEMAS: app
      PGRST_DB_ANON_ROLE: web_anon
      PGRST_OPENAPI_SERVER_PROXY_URI: http://localhost:3000
      PGRST_SERVER_CORS_ALLOWED_ORIGINS: http://localhost:8080
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - postgrest

volumes:
  pgdata:
