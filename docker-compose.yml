# Dev stack — PostgreSQL 17 + PostgREST (port 5433/3000)
# Frontend: React app on localhost:5173 (npm run dev in app/)
# Usage: make dev-up / make dev-down / make dev-clean
services:
  postgres:
    image: pg-workbench
    ports:
      - "5433:5432"
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - ./data/pgdata:/var/lib/postgresql/data
      - ./seed:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 5s
      retries: 10

  postgrest:
    image: postgrest/postgrest:v12.2.3
    ports:
      - "3000:3000"
    environment:
      PGRST_DB_URI: postgres://authenticator:authenticator@postgres:5432/postgres
      PGRST_DB_SCHEMAS: ${PGRST_DB_SCHEMAS:-pgv}
      PGRST_DB_EXTRA_SEARCH_PATH: public,pgv
      PGRST_DB_ANON_ROLE: anon
      PGRST_DB_PRE_REQUEST: workbench.postgrest_pre_request
      PGRST_DB_CHANNEL_ENABLED: "true"
    depends_on:
      postgres:
        condition: service_healthy

