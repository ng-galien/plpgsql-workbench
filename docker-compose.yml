# Dev DB — Supabase PostgreSQL 17 (port 5433)
# Extensions: plpgsql_check, pgtap, pgcrypto, uuid-ossp, etc.
# Usage: docker compose up -d / docker compose down -v (wipe)
services:
  postgres:
    image: supabase/postgres:17.6.1.093
    ports:
      - "5433:5432"
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
      JWT_SECRET: super-secret-jwt-token-with-at-least-32-characters
      JWT_EXP: 3600
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./seed:/docker-entrypoint-initdb.d/init-scripts:ro
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10
    command:
      - postgres
      - -c
      - config_file=/etc/postgresql/postgresql.conf
      - -c
      - log_min_messages=fatal

volumes:
  pgdata:
