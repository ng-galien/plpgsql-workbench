server {
    listen 80;

    gzip on;
    gzip_types text/html text/css application/javascript application/json image/svg+xml;
    gzip_min_length 256;

    # PostgREST API
    location ^~ /rpc/ {
        proxy_pass http://postgrest:3000/rpc/;
        proxy_set_header Host $host;
        proxy_set_header Accept $http_accept;
    }

    # MCP API (host machine)
    location ^~ /api/ {
        proxy_pass http://host.docker.internal:3100/api/;
        proxy_set_header Host $host;
    }

    # WebSocket terminals (xterm.js → MCP server)
    location ^~ /ws/ {
        proxy_pass http://host.docker.internal:3100/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Root: dev module index
    location = / {
        root /usr/share/nginx/html;
        try_files /dev-index.html =404;
    }

    # Static assets + SPA shell fallback
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }
}
