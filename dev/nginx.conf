server {
    listen 80;

    # PostgREST API
    location ^~ /rpc/ {
        proxy_pass http://postgrest:3000/rpc/;
        proxy_set_header Host $host;
        proxy_set_header Accept $http_accept;
    }

    # MCP API (host machine)
    location ^~ /api/ {
        proxy_pass http://host.docker.internal:3100/api/;
        proxy_set_header Host $host;
    }

    # Root: dev module index
    location = / {
        root /usr/share/nginx/html;
        try_files /dev-index.html =404;
    }

    # Static assets + SPA shell fallback
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }
}
