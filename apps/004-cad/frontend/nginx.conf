server {
    listen 80;

    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }

    location /rpc/ {
        proxy_pass http://postgrest:3000/rpc/;
        proxy_set_header Host $host;
        proxy_set_header Accept $http_accept;
    }

    # Proxy MCP server for folder picker (requires MCP server running on host)
    location /api/ {
        proxy_pass http://host.docker.internal:3100/api/;
        proxy_set_header Host $host;
    }
}
