<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Shop Demo — PL/pgSQL Workbench</title>
<style>
  :root {
    --bg: #0f1117; --surface: #1a1d27; --border: #2a2d3a;
    --text: #e4e4e7; --muted: #71717a; --accent: #6366f1;
    --green: #22c55e; --red: #ef4444; --amber: #f59e0b;
    --radius: 8px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; }
  header h1 { font-size: 18px; font-weight: 600; }
  header h1 span { color: var(--accent); }
  .cart-badge { background: var(--accent); color: white; font-size: 12px; padding: 2px 8px; border-radius: 12px; cursor: pointer; }

  main { max-width: 1100px; margin: 0 auto; padding: 24px; }

  .tabs { display: flex; gap: 4px; margin-bottom: 24px; }
  .tab { padding: 8px 16px; border-radius: var(--radius); border: 1px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; font-size: 14px; transition: all .15s; }
  .tab:hover { border-color: var(--accent); color: var(--text); }
  .tab.active { background: var(--accent); border-color: var(--accent); color: white; }

  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 16px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; transition: border-color .15s; }
  .card:hover { border-color: var(--accent); }
  .card h3 { font-size: 16px; margin-bottom: 8px; }
  .card .price { font-size: 20px; font-weight: 700; color: var(--accent); }
  .card .stock { font-size: 12px; color: var(--muted); margin-top: 4px; }
  .card .stock.low { color: var(--amber); }
  .card .stock.out { color: var(--red); }

  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: var(--radius); border: none; font-size: 13px; cursor: pointer; transition: all .15s; font-weight: 500; }
  .btn-primary { background: var(--accent); color: white; }
  .btn-primary:hover { filter: brightness(1.15); }
  .btn-primary:disabled { opacity: .4; cursor: not-allowed; }
  .btn-danger { background: var(--red); color: white; }
  .btn-danger:hover { filter: brightness(1.15); }
  .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
  .btn-ghost:hover { color: var(--text); border-color: var(--accent); }
  .card .btn { margin-top: 12px; width: 100%; justify-content: center; }

  .qty { display: flex; align-items: center; gap: 8px; margin-top: 12px; }
  .qty button { width: 28px; height: 28px; border-radius: 4px; border: 1px solid var(--border); background: var(--surface); color: var(--text); cursor: pointer; font-size: 16px; }
  .qty span { font-size: 14px; min-width: 20px; text-align: center; }

  .panel { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; }
  .panel h2 { font-size: 18px; margin-bottom: 16px; }

  table { width: 100%; border-collapse: collapse; }
  th, td { text-align: left; padding: 10px 12px; border-bottom: 1px solid var(--border); font-size: 14px; }
  th { color: var(--muted); font-weight: 500; font-size: 12px; text-transform: uppercase; letter-spacing: .5px; }

  .badge { font-size: 11px; padding: 2px 8px; border-radius: 4px; font-weight: 600; text-transform: uppercase; }
  .badge-confirmed { background: #052e16; color: var(--green); }
  .badge-cancelled { background: #2d1215; color: var(--red); }
  .badge-shipped { background: #1c1917; color: var(--amber); }
  .badge-pending { background: #1e1b4b; color: var(--accent); }
  .badge-bronze { background: #292524; color: #a8a29e; }
  .badge-silver { background: #1e293b; color: #94a3b8; }
  .badge-gold { background: #292211; color: var(--amber); }
  .badge-platinum { background: #1e1b4b; color: var(--accent); }

  .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 20px; }
  .stat { background: var(--bg); border-radius: var(--radius); padding: 16px; text-align: center; }
  .stat .value { font-size: 24px; font-weight: 700; color: var(--accent); }
  .stat .label { font-size: 12px; color: var(--muted); margin-top: 4px; }

  .cart-panel { margin-top: 16px; }
  .cart-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .cart-item:last-child { border: none; }
  .cart-total { display: flex; justify-content: space-between; padding: 16px 0 8px; font-weight: 700; font-size: 18px; border-top: 2px solid var(--border); margin-top: 8px; }
  .discount-row { display: flex; gap: 8px; margin-bottom: 12px; }
  .discount-row input { flex: 1; padding: 8px 12px; border-radius: var(--radius); border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 14px; }

  .customer-select { display: flex; gap: 8px; margin-bottom: 20px; align-items: center; }
  .customer-select select { padding: 8px 12px; border-radius: var(--radius); border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 14px; }
  .customer-select label { font-size: 14px; color: var(--muted); }

  .search { margin-bottom: 20px; }
  .search input { width: 100%; padding: 10px 16px; border-radius: var(--radius); border: 1px solid var(--border); background: var(--surface); color: var(--text); font-size: 14px; }
  .search input:focus { outline: none; border-color: var(--accent); }

  .toast { position: fixed; bottom: 24px; right: 24px; padding: 12px 20px; border-radius: var(--radius); font-size: 14px; z-index: 100; animation: slideIn .3s ease; }
  .toast-success { background: #052e16; color: var(--green); border: 1px solid #14532d; }
  .toast-error { background: #2d1215; color: var(--red); border: 1px solid #7f1d1d; }
  @keyframes slideIn { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

  .hidden { display: none; }
  .empty { text-align: center; color: var(--muted); padding: 40px; }
</style>
</head>
<body>
<header>
  <h1><span>Shop</span> Demo</h1>
  <div style="display:flex;gap:12px;align-items:center">
    <div class="customer-select">
      <label>Customer:</label>
      <select id="customerSelect" onchange="switchCustomer()"></select>
    </div>
    <div class="cart-badge" onclick="showTab('cart')">Cart (<span id="cartCount">0</span>)</div>
  </div>
</header>
<main>
  <div class="tabs">
    <button class="tab active" onclick="showTab('catalog')">Catalog</button>
    <button class="tab" onclick="showTab('cart')">Cart</button>
    <button class="tab" onclick="showTab('orders')">Orders</button>
    <button class="tab" onclick="showTab('dashboard')">Dashboard</button>
  </div>

  <!-- CATALOG -->
  <div id="view-catalog">
    <div class="search"><input type="text" placeholder="Search products..." oninput="searchCatalog(this.value)"></div>
    <div class="grid" id="productGrid"></div>
  </div>

  <!-- CART -->
  <div id="view-cart" class="hidden">
    <div class="panel">
      <h2>Shopping Cart</h2>
      <div id="cartItems"></div>
      <div class="discount-row">
        <input type="text" id="discountCode" placeholder="Discount code">
        <button class="btn btn-ghost" onclick="applyDiscount()">Apply</button>
      </div>
      <div class="cart-total"><span>Total</span><span id="cartTotal">$0.00</span></div>
      <button class="btn btn-primary" style="width:100%;margin-top:12px" onclick="placeOrder()">Place Order</button>
    </div>
  </div>

  <!-- ORDERS -->
  <div id="view-orders" class="hidden">
    <div class="panel">
      <h2>Order History</h2>
      <table>
        <thead><tr><th>Order</th><th>Status</th><th>Items</th><th>Total</th><th>Date</th><th></th></tr></thead>
        <tbody id="ordersBody"></tbody>
      </table>
    </div>
    <div id="orderDetail" class="panel hidden" style="margin-top:16px">
      <h2>Order Detail</h2>
      <div id="orderDetailContent"></div>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div id="view-dashboard" class="hidden">
    <div id="dashboardContent"></div>
  </div>
</main>

<script>
const API = 'http://localhost:3000/rpc';
let cart = [];
let currentCustomer = 1;
let customers = [];

async function rpc(fn, params = {}) {
  const res = await fetch(`${API}/${fn}`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(params),
  });
  if (!res.ok) {
    const err = await res.json();
    throw new Error(err.message || 'API error');
  }
  return res.json();
}

function toast(msg, type = 'success') {
  const el = document.createElement('div');
  el.className = `toast toast-${type}`;
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

function showTab(name) {
  document.querySelectorAll('[id^="view-"]').forEach(v => v.classList.add('hidden'));
  document.getElementById(`view-${name}`).classList.remove('hidden');
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelector(`.tab[onclick*="${name}"]`).classList.add('active');
  if (name === 'orders') loadOrders();
  if (name === 'dashboard') loadDashboard();
  if (name === 'cart') renderCart();
}

// CUSTOMERS
async function loadCustomers() {
  const res = await fetch('http://localhost:3000/customers?order=id');
  customers = await res.json();
  const sel = document.getElementById('customerSelect');
  sel.innerHTML = customers.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
}

function switchCustomer() {
  currentCustomer = parseInt(document.getElementById('customerSelect').value);
  const view = document.querySelector('[id^="view-"]:not(.hidden)').id.replace('view-', '');
  if (view === 'orders') loadOrders();
  if (view === 'dashboard') loadDashboard();
}

// CATALOG
async function searchCatalog(q) {
  const params = {};
  if (q) params.p_search = q;
  const data = await rpc('get_catalog', params);
  renderProducts(data.products);
}

function renderProducts(products) {
  const grid = document.getElementById('productGrid');
  grid.innerHTML = products.map(p => {
    const stockClass = p.stock === 0 ? 'out' : p.stock < 10 ? 'low' : '';
    const stockText = p.stock === 0 ? 'Out of stock' : `${p.stock} in stock`;
    const inCart = cart.find(c => c.id === p.id);
    return `<div class="card">
      <h3>${p.name}</h3>
      <div class="price">$${p.price.toFixed(2)}</div>
      <div class="stock ${stockClass}">${stockText}</div>
      ${p.stock > 0 ? `
        <div class="qty">
          <button onclick="updateQty(${p.id},'${p.name}',${p.price},-1)">-</button>
          <span id="qty-${p.id}">${inCart ? inCart.qty : 0}</span>
          <button onclick="updateQty(${p.id},'${p.name}',${p.price},1)">+</button>
        </div>
        <button class="btn btn-primary" onclick="addToCart(${p.id},'${p.name}',${p.price})">Add to cart</button>
      ` : `<button class="btn btn-ghost" disabled style="margin-top:12px;width:100%">Unavailable</button>`}
    </div>`;
  }).join('');
}

function updateQty(id, name, price, delta) {
  let item = cart.find(c => c.id === id);
  if (!item && delta > 0) {
    item = { id, name, price, qty: 0 };
    cart.push(item);
  }
  if (item) {
    item.qty = Math.max(0, item.qty + delta);
    if (item.qty === 0) cart = cart.filter(c => c.id !== id);
  }
  const el = document.getElementById(`qty-${id}`);
  if (el) el.textContent = item ? item.qty : 0;
  updateCartBadge();
}

function addToCart(id, name, price) {
  let item = cart.find(c => c.id === id);
  if (!item) {
    cart.push({ id, name, price, qty: 1 });
  } else {
    item.qty++;
  }
  const el = document.getElementById(`qty-${id}`);
  if (el) el.textContent = cart.find(c => c.id === id)?.qty || 0;
  updateCartBadge();
  toast(`${name} added to cart`);
}

function updateCartBadge() {
  document.getElementById('cartCount').textContent = cart.reduce((s, c) => s + c.qty, 0);
}

// CART
function renderCart() {
  const container = document.getElementById('cartItems');
  if (cart.length === 0) {
    container.innerHTML = '<div class="empty">Your cart is empty</div>';
    document.getElementById('cartTotal').textContent = '$0.00';
    return;
  }
  container.innerHTML = cart.map(c => `
    <div class="cart-item">
      <div>
        <strong>${c.name}</strong>
        <div style="color:var(--muted);font-size:13px">$${c.price.toFixed(2)} x ${c.qty}</div>
      </div>
      <div style="display:flex;align-items:center;gap:12px">
        <span style="font-weight:600">$${(c.price * c.qty).toFixed(2)}</span>
        <button class="btn btn-ghost" onclick="removeFromCart(${c.id})" style="padding:4px 8px;font-size:12px">Remove</button>
      </div>
    </div>
  `).join('');
  const total = cart.reduce((s, c) => s + c.price * c.qty, 0);
  document.getElementById('cartTotal').textContent = `$${total.toFixed(2)}`;
}

function removeFromCart(id) {
  cart = cart.filter(c => c.id !== id);
  updateCartBadge();
  renderCart();
}

async function placeOrder() {
  if (cart.length === 0) return toast('Cart is empty', 'error');
  const items = cart.map(c => ({ product_id: c.id, quantity: c.qty }));
  const code = document.getElementById('discountCode').value.trim() || null;
  try {
    const orderId = await rpc('place_order', {
      p_customer_id: currentCustomer,
      p_items: items,
      p_discount_code: code,
    });
    cart = [];
    updateCartBadge();
    document.getElementById('discountCode').value = '';
    toast(`Order #${orderId} placed!`);
    showTab('orders');
    searchCatalog('');
  } catch (e) {
    toast(e.message, 'error');
  }
}

// ORDERS
async function loadOrders() {
  const dashboard = await rpc('get_customer_dashboard', { p_customer_id: currentCustomer });
  const orders = dashboard.recent_orders || [];
  const tbody = document.getElementById('ordersBody');
  if (orders.length === 0) {
    tbody.innerHTML = '<tr><td colspan="6" class="empty">No orders yet</td></tr>';
    return;
  }
  tbody.innerHTML = orders.map(o => `
    <tr>
      <td>#${o.order_id}</td>
      <td><span class="badge badge-${o.status}">${o.status}</span></td>
      <td>${o.items}</td>
      <td>$${o.total.toFixed(2)}</td>
      <td style="color:var(--muted)">${new Date(o.created_at).toLocaleDateString()}</td>
      <td>
        <button class="btn btn-ghost" onclick="viewOrder(${o.order_id})" style="padding:4px 10px;font-size:12px">View</button>
        ${o.status === 'confirmed' ? `<button class="btn btn-danger" onclick="cancelOrder(${o.order_id})" style="padding:4px 10px;font-size:12px">Cancel</button>` : ''}
      </td>
    </tr>
  `).join('');
}

async function viewOrder(id) {
  const data = await rpc('get_order_details', { p_order_id: id });
  const el = document.getElementById('orderDetail');
  el.classList.remove('hidden');
  document.getElementById('orderDetailContent').innerHTML = `
    <div style="display:flex;justify-content:space-between;margin-bottom:16px">
      <div>
        <strong>Order #${data.order_id}</strong>
        <span class="badge badge-${data.status}" style="margin-left:8px">${data.status}</span>
      </div>
      <div style="color:var(--muted)">${new Date(data.created_at).toLocaleString()}</div>
    </div>
    <table>
      <thead><tr><th>Product</th><th>Qty</th><th>Price</th><th>Subtotal</th></tr></thead>
      <tbody>
        ${data.items.map(i => `<tr><td>${i.product}</td><td>${i.quantity}</td><td>$${i.unit_price.toFixed(2)}</td><td>$${i.subtotal.toFixed(2)}</td></tr>`).join('')}
      </tbody>
    </table>
    <div style="margin-top:16px;text-align:right">
      <div style="color:var(--muted)">Subtotal: $${data.subtotal.toFixed(2)}</div>
      ${data.discount_amount > 0 ? `<div style="color:var(--green)">Discount (${data.discount_code}): -$${data.discount_amount.toFixed(2)}</div>` : ''}
      <div style="font-size:20px;font-weight:700;color:var(--accent);margin-top:4px">Total: $${data.total.toFixed(2)}</div>
    </div>
    <div style="margin-top:12px;padding:12px;background:var(--bg);border-radius:var(--radius)">
      <span style="color:var(--muted)">Customer:</span> ${data.customer.name}
      <span class="badge badge-${data.customer.tier}" style="margin-left:8px">${data.customer.tier}</span>
    </div>
  `;
}

async function cancelOrder(id) {
  try {
    await rpc('cancel_order', { p_order_id: id });
    toast(`Order #${id} cancelled`);
    loadOrders();
    searchCatalog('');
  } catch (e) {
    toast(e.message, 'error');
  }
}

// DASHBOARD
async function loadDashboard() {
  const data = await rpc('get_customer_dashboard', { p_customer_id: currentCustomer });
  if (data.error) {
    document.getElementById('dashboardContent').innerHTML = `<div class="empty">${data.error}</div>`;
    return;
  }
  document.getElementById('dashboardContent').innerHTML = `
    <div class="panel" style="margin-bottom:16px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
        <h2>${data.customer.name}</h2>
        <span class="badge badge-${data.tier}" style="font-size:14px;padding:4px 12px">${data.tier}</span>
      </div>
      <div style="color:var(--muted);font-size:13px;margin-bottom:4px">${data.customer.email}</div>
      <div style="color:var(--muted);font-size:13px">Member since ${new Date(data.customer.member_since).toLocaleDateString()}</div>
      ${data.tier_discount > 0 ? `<div style="margin-top:8px;color:var(--green);font-size:13px">${data.tier_discount}% tier discount on all orders</div>` : ''}
    </div>
    <div class="stats">
      <div class="stat"><div class="value">${data.stats.total_orders}</div><div class="label">Orders</div></div>
      <div class="stat"><div class="value">$${Number(data.stats.total_spent).toFixed(0)}</div><div class="label">Total Spent</div></div>
      <div class="stat"><div class="value">$${Number(data.stats.avg_order).toFixed(0)}</div><div class="label">Avg Order</div></div>
      <div class="stat"><div class="value">${data.stats.cancelled}</div><div class="label">Cancelled</div></div>
    </div>
    <div class="panel">
      <h2>Recent Orders</h2>
      ${data.recent_orders.length === 0 ? '<div class="empty">No orders yet</div>' : `
        <table>
          <thead><tr><th>Order</th><th>Status</th><th>Items</th><th>Total</th><th>Date</th></tr></thead>
          <tbody>
            ${data.recent_orders.map(o => `
              <tr>
                <td>#${o.order_id}</td>
                <td><span class="badge badge-${o.status}">${o.status}</span></td>
                <td>${o.items}</td>
                <td>$${o.total.toFixed(2)}</td>
                <td style="color:var(--muted)">${new Date(o.created_at).toLocaleDateString()}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `}
    </div>
  `;
}

// INIT
async function init() {
  await loadCustomers();
  await searchCatalog('');
}
init();
</script>
</body>
</html>
