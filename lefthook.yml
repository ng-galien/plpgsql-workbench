pre-commit:
  parallel: true
  jobs:
    - name: biome
      glob: "**/*.{ts,tsx}"
      run: npx biome check --no-errors-on-unmatched --diagnostic-level=error {staged_files}
    - name: stylelint
      glob: "**/*.css"
      run: npx stylelint {staged_files}

pre-push:
  jobs:
    - name: typecheck
      run: make check
