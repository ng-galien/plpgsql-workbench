<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>pgView</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <link rel="stylesheet" href="/pgview.css?v=2">
  <style>[x-cloak]{display:none!important}</style>
  <script>
    // Platform config — Cloudflare Pages → Supabase PostgREST
    window.__PGV_CONFIG__ = (function() {
      var rpcBase = "http://localhost:54321/rest/v1/rpc";
      var restBase = "http://localhost:54321/rest/v1";
      var supabaseUrl = "http://localhost:54321";
      var supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRXP1A7WOeoJeXxjNni43kdQwgnWNReilDMblYTn_I0";
      return {
        rpcBase: rpcBase,
        restBase: restBase,
        supabaseUrl: supabaseUrl,
        supabaseKey: supabaseKey,
        headers: function(accept, schema) {
          return {
            "apikey": supabaseKey,
            "Content-Type": "application/json",
            "Accept": accept || "application/json",
            "Content-Profile": schema || "pgv",
          };
        },
        rpc: function(path) { return rpcBase + path; },
      };
    })();
  </script>
  <!-- Stack: Alpine.js (UI), Zustand (state), D3.js (SVG canvas), PicoCSS (style), marked.js (tables) -->
  <script src="/pgv-modules.js"></script>
  <script src="/ops.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/panzoom@9/dist/panzoom.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/zustand@5/umd/vanilla.production.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
  <script src="/pgview.js"></script>
</head>
<body x-data="pgview" x-init="boot()">

  <!-- App bar (multi-module mode) -->
  <div class="pgv-app-bar" x-show="_modules.length > 0" x-cloak>
    <a href="/" @click.prevent="go('/')" class="pgv-app-home" :title="t('home')">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    </a>
    <div class="pgv-app-nav">
      <template x-for="mod in _modules" :key="mod.module">
        <a :href="'/' + mod.schema + '/'"
           @click.prevent="go('/' + mod.schema + '/')"
           :class="{'pgv-app-active': _currentSchema === mod.schema}"
           x-text="mod.brand"></a>
      </template>
    </div>
    <div class="pgv-app-end">
      <button class="pgv-app-search-btn" @click="searchOpen()" :title="t('search')">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><circle cx="6.5" cy="6.5" r="5"/><line x1="10" y1="10" x2="15" y2="15"/></svg>
      </button>
      <button class="pgv-theme-toggle" data-toggle-theme @click="_themeToggle()">&#x263E;</button>
    </div>
  </div>

  <!-- Page content -->
  <div id="app">
    <main class="container" aria-busy="true"
      style="min-height:50vh;display:flex;align-items:center;justify-content:center">
      Chargement...
    </main>
  </div>

  <!-- Issue Report Button -->
  <button class="pgv-issue-btn" @click="issueOpen()" :title="t('issue.title')">&#x270F;&#xFE0F;</button>

  <!-- Issue Report Overlay -->
  <template x-if="issue.open">
    <div>
      <div class="pgv-issue-backdrop" @click="issueClose()"></div>
      <div class="pgv-issue-panel" @keydown.escape.prevent="issueClose()">
        <header class="pgv-issue-header">
          <strong x-text="t('issue.title')"></strong>
          <button class="pgv-issue-close" @click="issueClose()">&times;</button>
        </header>
        <div class="pgv-issue-body">
          <select x-model="issue.type" class="pgv-issue-type">
            <option value="bug" x-text="t('issue.type_bug')">Bug</option>
            <option value="enhancement" x-text="t('issue.type_enhancement')">Amélioration</option>
            <option value="question" x-text="t('issue.type_question')">Question</option>
          </select>
          <label for="issue-desc" x-text="t('issue.label')"></label>
          <textarea id="issue-desc" x-model="issue.desc" rows="4" :placeholder="t('issue.placeholder')"></textarea>
          <details>
            <summary x-text="t('issue.context')"></summary>
            <pre x-text="JSON.stringify(issueContext(), null, 2)"></pre>
          </details>
        </div>
        <footer class="pgv-issue-footer">
          <button class="secondary" @click="issueClose()" x-text="t('cancel')"></button>
          <button @click="issueSubmit()" :disabled="!issue.desc.trim()" x-text="t('send')"></button>
        </footer>
      </div>
    </div>
  </template>

  <!-- Toast -->
  <div id="toast" role="alert" x-show="toast.show" x-transition>
    <article :class="'toast-' + toast.level">
      <button class="toast-close" @click="toast.show = false">&times;</button>
      <div style="font-weight:600;margin-bottom:0.15rem" x-text="toast.msg"></div>
      <div x-show="toast.detail" style="color:var(--pgv-muted);font-size:0.8rem"
           x-text="toast.detail"></div>
      <a x-show="toast.href" class="pgv-toast-link" :href="toast.href"
         @click.prevent="toast.show = false; go(toast.href)">Ouvrir &rarr;</a>
      <a x-show="toast.level === 'error' && !toast.href" class="pgv-toast-report" href="#"
         @click.prevent="issueFromError()" x-text="t('issue.report')"></a>
    </article>
  </div>

  <!-- Search Overlay (Cmd+K) -->
  <template x-if="search.open">
    <div>
      <div class="pgv-search-backdrop" @click="searchClose()"></div>
      <div class="pgv-search-palette" @keydown.escape.prevent="searchClose()" @keydown.arrow-down.prevent="searchNav(1)" @keydown.arrow-up.prevent="searchNav(-1)" @keydown.enter.prevent="searchSelect()">
        <div class="pgv-search-input-row">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><circle cx="6.5" cy="6.5" r="5"/><line x1="10" y1="10" x2="15" y2="15"/></svg>
          <input class="pgv-search-input" type="text" :placeholder="t('search.placeholder')" x-ref="searchInput" x-model="search.query" @input.debounce.200ms="searchExec()" autofocus>
          <span class="pgv-search-hint">ESC</span>
        </div>
        <div x-ref="searchResults" @click="var it=event.target.closest('.pgv-search-item');if(it){search.idx=[].indexOf.call($refs.searchResults.querySelectorAll('.pgv-search-item'),it);searchSelect();}"></div>
        <div class="pgv-search-footer">
          <span><kbd>&uarr;</kbd><kbd>&darr;</kbd> <span x-text="t('search.nav')"></span></span>
          <span><kbd>Enter</kbd> <span x-text="t('search.open')"></span></span>
          <span><kbd>Esc</kbd> <span x-text="t('search.close')"></span></span>
        </div>
      </div>
    </div>
  </template>

  <!-- Dialog (shell-owned, reusable) -->
  <dialog x-ref="dialog">
    <article style="width:min(90vw,520px);margin:0">
      <header>
        <button :aria-label="t('close')" rel="prev" @click="$refs.dialog.close()"></button>
        <strong x-text="dlg.title"></strong>
      </header>
      <div x-ref="dlgBody"></div>
      <footer style="display:flex;justify-content:flex-end;gap:.5rem">
        <button class="secondary" @click="$refs.dialog.close()" x-text="t('cancel')"></button>
        <button @click="dlgSelect()" x-text="t('select')"></button>
      </footer>
    </article>
  </dialog>

  <!-- Confirm Dialog (replaces native confirm()) -->
  <dialog x-ref="confirmDialog" class="pgv-confirm-dialog">
    <article class="pgv-confirm-article">
      <header class="pgv-confirm-header">
        <strong x-text="t('confirm.title')"></strong>
      </header>
      <div class="pgv-confirm-body" x-ref="confirmMsg"></div>
      <footer class="pgv-confirm-footer">
        <button class="secondary" x-ref="confirmNo" x-text="t('cancel')"></button>
        <button x-ref="confirmYes" x-text="t('confirm')"></button>
      </footer>
    </article>
  </dialog>

  <script>
  // ── pgv.plugin runtime ──────────────────────────────────────
  (function() {
    var registry = {};
    var instances = [];
    var pending = [];

    window.pgv = window.pgv || {};

    pgv.plugin = function(name, def) {
      registry[name] = def;
      if (typeof Alpine !== 'undefined' && Alpine.data) {
        _register(name, def);
      } else {
        pending.push({ name: name, def: def });
      }
    };

    pgv._flushPlugins = function() {
      for (var i = 0; i < pending.length; i++) {
        _register(pending[i].name, pending[i].def);
      }
      pending = [];
    };

    function _register(name, def) {
      Alpine.data(name, function() {
        var comp = {};
        if (def.data) {
          var d = def.data();
          var keys = Object.keys(d);
          for (var i = 0; i < keys.length; i++) comp[keys[i]] = d[keys[i]];
        }
        var priv = def.priv ? def.priv() : {};
        Object.defineProperty(comp, '_priv', {
          get: function() { return priv; },
          enumerable: false,
          configurable: false
        });
        comp.init = function() {
          this._rootEl = this.$el;
          if (def.events && def.events.listen) {
            this._cleanups = [];
            var self = this;
            var evts = Object.keys(def.events.listen);
            for (var j = 0; j < evts.length; j++) {
              (function(evt) {
                var method = def.events.listen[evt];
                var handler = function(e) { self[method](e.detail); };
                window.addEventListener(evt, handler);
                self._cleanups.push(function() {
                  window.removeEventListener(evt, handler);
                });
              })(evts[j]);
            }
          }
        };
        if (def.methods) {
          var mk = Object.keys(def.methods);
          for (var i = 0; i < mk.length; i++) comp[mk[i]] = def.methods[mk[i]];
        }
        comp.$emit = function(evtName, detail) {
          window.dispatchEvent(new CustomEvent(evtName, { detail: detail }));
        };
        return comp;
      });
    }

    pgv.mount = function(el) {
      var nodes = el.querySelectorAll('[x-data]');
      for (var n = 0; n < nodes.length; n++) {
        (function(node) {
          var raw = node.getAttribute('x-data');
          var name = raw.replace(/\(.*/, '').trim();
          var def = registry[name];
          if (!def) return;
          for (var i = 0; i < instances.length; i++) {
            if (instances[i].el === node) return;
          }
          var depsReady = !def.deps ? Promise.resolve() : _loadDeps(def.deps);
          depsReady.then(function() {
            var instance = Alpine.$data(node);
            if (def.mount) def.mount.call(instance, node);
            instances.push({ name: name, el: node, def: def, instance: instance });
          }).catch(function(err) {
            console.error('[pgv.plugin] ' + name + ' mount failed:', err);
            node.innerHTML = '<div class="pgv-plugin-error">'
              + '<p>Composant ' + name + ' indisponible</p>'
              + '<small>' + (err && err.message || String(err)) + '</small>'
              + '</div>';
          });
        })(nodes[n]);
      }
    };

    pgv.unmount = function() {
      for (var i = 0; i < instances.length; i++) {
        try {
          var inst = instances[i];
          if (inst.instance._cleanups) {
            for (var j = 0; j < inst.instance._cleanups.length; j++) {
              inst.instance._cleanups[j]();
            }
          }
          if (inst.def.unmount) inst.def.unmount.call(inst.instance);
        } catch (e) {
          console.warn('[pgv.plugin] unmount error ' + instances[i].name + ':', e);
        }
      }
      instances = [];
    };

    var depCache = {};
    function _loadDeps(deps) {
      var promises = [];
      for (var i = 0; i < deps.length; i++) {
        (function(dep) {
          if (dep.test && dep.test()) {
            promises.push(Promise.resolve());
            return;
          }
          if (depCache[dep.src]) {
            promises.push(depCache[dep.src]);
            return;
          }
          depCache[dep.src] = new Promise(function(resolve, reject) {
            var el;
            if (dep.type === 'script') {
              el = document.createElement('script');
              el.src = dep.src;
            } else if (dep.type === 'style') {
              el = document.createElement('link');
              el.rel = 'stylesheet';
              el.href = dep.src;
            } else {
              return resolve();
            }
            el.onload = resolve;
            el.onerror = function() { reject(new Error('Failed to load ' + dep.src)); };
            document.head.appendChild(el);
          });
          promises.push(depCache[dep.src]);
        })(deps[i]);
      }
      return Promise.all(promises);
    }
  })();

  document.addEventListener('alpine:init', function() {
    pgv.registerShell(Alpine);
  });
  </script>
</body>
</html>
